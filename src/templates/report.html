<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessibility Report</title>
  <style>
    :root {
      --critical: #dc2626;
      --serious: #ea580c;
      --moderate: #ca8a04;
      --minor: #2563eb;
      --success: #16a34a;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header { margin-bottom: 2rem; }

    h1 { font-size: 1.75rem; font-weight: 600; }
    .generated { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
    }

    .summary-card .value { font-size: 2rem; font-weight: 700; }
    .summary-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .summary-card.critical .value { color: var(--critical); }
    .summary-card.serious .value { color: var(--serious); }
    .summary-card.moderate .value { color: var(--moderate); }
    .summary-card.minor .value { color: var(--minor); }

    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .section-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .section-content { padding: 0; }

    .issue-row {
      border-bottom: 1px solid var(--border);
    }

    .issue-row:last-child { border-bottom: none; }

    .issue-header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      gap: 0.75rem;
    }

    .issue-header:hover { background: var(--bg); }

    .issue-chevron {
      color: var(--text-muted);
      font-size: 0.75rem;
      transition: transform 0.15s;
    }

    .issue-row.open .issue-chevron { transform: rotate(90deg); }

    .issue-id {
      font-family: monospace;
      font-weight: 600;
    }

    .issue-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .issue-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      flex: 1;
    }

    .issue-learn {
      font-size: 0.75rem;
    }

    .impact-badge {
      font-size: 0.625rem;
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      text-transform: uppercase;
      font-weight: 600;
    }

    .impact-critical { background: #fef2f2; color: var(--critical); }
    .impact-serious { background: #fff7ed; color: var(--serious); }
    .impact-moderate { background: #fefce8; color: var(--moderate); }
    .impact-minor { background: #eff6ff; color: var(--minor); }

    .issue-pages {
      display: none;
      background: var(--bg);
      padding: 0.75rem 1.25rem 0.75rem 2.5rem;
      border-top: 1px solid var(--border);
    }

    .issue-row.open .issue-pages { display: block; }

    .issue-page {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-family: monospace;
      font-size: 0.875rem;
    }

    .issue-page:last-child { border-bottom: none; }

    .issue-page a { color: var(--text); text-decoration: none; }
    .issue-page a:hover { text-decoration: underline; }

    .issue-page-count {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-left: 0.5rem;
      text-decoration: underline;
      cursor: pointer;
    }

    .issue-page-count:hover {
      color: var(--text);
    }

    .controls {
      display: flex;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .filter-select {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      font-size: 0.875rem;
      background: var(--card-bg);
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: 0.75rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .url-cell {
      font-family: monospace;
      font-size: 0.875rem;
      word-break: break-all;
    }

    .status-error { color: var(--critical); font-size: 0.75rem; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-row { cursor: pointer; }
    .page-row:hover { background: var(--bg); }

    .page-chevron {
      color: var(--text-muted);
      font-size: 0.75rem;
      display: inline-block;
      transition: transform 0.15s;
    }

    .page-row.open .page-chevron { transform: rotate(90deg); }

    .page-details {
      display: none;
      background: var(--bg);
    }

    .page-details.open { display: table-row; }

    .page-details td { padding: 1rem 1.25rem; }

    .violation-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .violation-item:last-child { border-bottom: none; }

    .node-html {
      font-family: monospace;
      font-size: 0.75rem;
      background: #f1f5f9;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      margin-top: 0.5rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Accessibility Report</h1>
      <p class="generated" id="generated-at"></p>
    </header>

    <div class="summary-grid" id="summary-grid"></div>

    <div class="section">
      <div class="section-header">Issues</div>
      <div class="section-content" id="issues-list"></div>
    </div>

    <div class="section">
      <div class="section-header">Pages</div>
      <div class="section-content">
        <div class="controls">
          <input type="text" class="search-input" id="search" placeholder="Search URLs...">
          <select class="filter-select" id="filter">
            <option value="all">All</option>
            <option value="critical">Has Critical</option>
            <option value="serious">Has Serious</option>
            <option value="issues">Has Issues</option>
            <option value="clean">No Issues</option>
            <option value="errors">Errors</option>
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width: 1.5rem"></th>
              <th>URL</th>
              <th>Critical</th>
              <th>Serious</th>
              <th>Moderate</th>
              <th>Minor</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="results-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- DATA_PLACEHOLDER -->

  <script>
    const data = JSON.parse(document.getElementById('report-data').textContent);

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('generated-at').textContent =
      `Generated: ${new Date(data.generatedAt).toLocaleString()}`;

    const summaryGrid = document.getElementById('summary-grid');
    [
      { value: data.totalUrls, label: 'Pages', class: '' },
      { value: data.totals.critical, label: 'Critical', class: 'critical' },
      { value: data.totals.serious, label: 'Serious', class: 'serious' },
      { value: data.totals.moderate, label: 'Moderate', class: 'moderate' },
      { value: data.totals.minor, label: 'Minor', class: 'minor' },
    ].forEach(card => {
      const div = document.createElement('div');
      div.className = `summary-card ${card.class}`;
      div.innerHTML = `<div class="value">${card.value}</div><div class="label">${card.label}</div>`;
      summaryGrid.appendChild(div);
    });

    const issuesList = document.getElementById('issues-list');
    if (data.topIssues.length === 0) {
      issuesList.innerHTML = '<div class="empty-state">No issues found</div>';
    } else {
      data.topIssues.forEach((issue, idx) => {
        const row = document.createElement('div');
        row.className = 'issue-row';
        row.innerHTML = `
          <div class="issue-header" data-idx="${idx}">
            <span class="issue-chevron">▶</span>
            <span class="issue-id">${issue.id}</span>
            <span class="impact-badge impact-${issue.impact}">${issue.impact}</span>
            <span class="issue-meta">${issue.affectedUrls.length} pages, ${issue.count} instances</span>
            <span class="issue-desc">${escapeHtml(issue.description)}</span>
            <a href="${issue.helpUrl}" target="_blank" rel="noopener" class="issue-learn" onclick="event.stopPropagation()">Learn more</a>
          </div>
          <div class="issue-pages">
            ${issue.affectedUrls.map(url => {
              const page = data.results.find(r => r.url === url);
              const v = page?.violations.find(v => v.id === issue.id);
              const count = v ? v.nodes.length : 0;
              const pageIdx = data.results.findIndex(r => r.url === url);
              return `<div class="issue-page"><a href="${url}" target="_blank">${url}</a><a href="#" class="issue-page-count" data-page-idx="${pageIdx}">${count} instances</a></div>`;
            }).join('')}
          </div>
        `;
        issuesList.appendChild(row);
      });

      document.querySelectorAll('.issue-header').forEach(header => {
        header.addEventListener('click', () => {
          header.parentElement.classList.toggle('open');
        });
      });

      document.querySelectorAll('.issue-page-count').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const pageIdx = link.dataset.pageIdx;
          const pageRow = document.getElementById(`page-row-${pageIdx}`);
          const detailsRow = document.getElementById(`page-details-${pageIdx}`);
          if (pageRow) {
            pageRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            if (!pageRow.classList.contains('open')) {
              pageRow.classList.add('open');
              detailsRow.classList.add('open');
            }
          }
        });
      });
    }

    let filteredResults = [...data.results];

    function getSeverityScore(r) {
      return r.critical * 1000 + r.serious * 100 + r.moderate * 10 + r.minor;
    }

    function renderTable() {
      const tbody = document.getElementById('results-table');
      tbody.innerHTML = '';

      if (filteredResults.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No results</td></tr>';
        return;
      }

      filteredResults.forEach((result) => {
        const originalIdx = data.results.findIndex(r => r.url === result.url);
        const tr = document.createElement('tr');
        tr.className = 'page-row';
        tr.id = `page-row-${originalIdx}`;
        tr.innerHTML = `
          <td><span class="page-chevron">▶</span></td>
          <td class="url-cell">${result.url}</td>
          <td style="color: ${result.critical > 0 ? 'var(--critical)' : 'inherit'}">${result.critical}</td>
          <td style="color: ${result.serious > 0 ? 'var(--serious)' : 'inherit'}">${result.serious}</td>
          <td style="color: ${result.moderate > 0 ? 'var(--moderate)' : 'inherit'}">${result.moderate}</td>
          <td>${result.minor}</td>
          <td>${result.success ? '<span style="color: var(--success)">OK</span>' : `<span class="status-error">${result.error || 'Error'}</span>`}</td>
        `;
        tbody.appendChild(tr);

        const detailsTr = document.createElement('tr');
        detailsTr.className = 'page-details';
        detailsTr.id = `page-details-${originalIdx}`;
        const detailsTd = document.createElement('td');
        detailsTd.colSpan = 7;

        if (result.violations.length === 0) {
          detailsTd.innerHTML = '<div class="empty-state">No violations</div>';
        } else {
          detailsTd.innerHTML = result.violations.map(v => `
            <div class="violation-item">
              <span class="issue-id">${v.id}</span>
              <span class="impact-badge impact-${v.impact}">${v.impact}</span>
              <span class="issue-meta">${v.nodes.length} instances</span>
              <a href="${v.helpUrl}" target="_blank" rel="noopener" style="margin-left: 0.5rem; font-size: 0.75rem;">Learn more</a>
              <div style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem;">${escapeHtml(v.help)}</div>
              ${v.nodes.slice(0, 3).map(n => `<div class="node-html">${escapeHtml(n.html)}</div>`).join('')}
              ${v.nodes.length > 3 ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-muted);">+ ${v.nodes.length - 3} more</div>` : ''}
            </div>
          `).join('');
        }

        detailsTr.appendChild(detailsTd);
        tbody.appendChild(detailsTr);

        tr.addEventListener('click', () => {
          tr.classList.toggle('open');
          detailsTr.classList.toggle('open');
        });
      });
    }

    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const filter = document.getElementById('filter').value;

      filteredResults = data.results.filter(r => {
        if (search && !r.url.toLowerCase().includes(search)) return false;
        if (filter === 'critical' && r.critical === 0) return false;
        if (filter === 'serious' && r.serious === 0) return false;
        if (filter === 'issues' && getSeverityScore(r) === 0) return false;
        if (filter === 'clean' && getSeverityScore(r) > 0) return false;
        if (filter === 'errors' && r.success) return false;
        return true;
      });

      filteredResults.sort((a, b) => getSeverityScore(b) - getSeverityScore(a));
      renderTable();
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('filter').addEventListener('change', applyFilters);

    applyFilters();
  </script>
</body>
</html>
